name: AWS ECS Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: shopsmart-run-${{ github.run_number }}-backend
  ECS_CLUSTER: shopsmart-run-${{ github.run_number }}-cluster
  ECS_SERVICE: shopsmart-run-${{ github.run_number }}-backend-service
  ENABLE_CONTAINER_SERVICES: ${{ secrets.ENABLE_CONTAINER_SERVICES }}
  ENABLE_ECR_PUSH: ${{ secrets.ENABLE_ECR_PUSH }}
  RUN_TERRAFORM_APPLY: ${{ secrets.RUN_TERRAFORM_APPLY }}
  TF_VAR_bucket_suffix: ${{ secrets.TF_BUCKET_SUFFIX }}
  TF_VAR_deployment_id: run-${{ github.run_number }}
  TF_VAR_enable_container_services: ${{ secrets.ENABLE_CONTAINER_SERVICES || 'false' }}
  TF_VAR_container_image_tag: latest

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: server

      - name: Lint backend
        run: npm run lint
        working-directory: server

      - name: Test backend
        run: |
          mkdir -p ../reports
          npm test -- --json --outputFile=../reports/backend-jest.json
        working-directory: server

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-pipeline-backend-test-report
          path: reports/backend-jest.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client

      - name: Test frontend
        run: |
          mkdir -p ../reports
          npm test -- --run --reporter=json --outputFile=../reports/client-vitest.json
        working-directory: client

      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-pipeline-frontend-test-report
          path: reports/client-vitest.json

      - name: Build frontend
        run: npm run build
        working-directory: client

  terraform:
    name: Terraform Validate and Optional Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        if: env.RUN_TERRAFORM_APPLY == 'true'
        run: terraform apply -auto-approve

      - name: Skip Terraform apply
        if: env.RUN_TERRAFORM_APPLY != 'true'
        run: echo "Terraform apply skipped because RUN_TERRAFORM_APPLY is not true."

  docker-and-deploy:
    name: Docker Build and Optional Deploy
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: env.ENABLE_ECR_PUSH == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.ENABLE_ECR_PUSH == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t shopsmart-backend:${{ github.sha }} -f server/Dockerfile server

      - name: Push Docker image to ECR
        if: env.ENABLE_ECR_PUSH == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag shopsmart-backend:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy existing ECS service
        if: env.ENABLE_ECR_PUSH == 'true' && env.ECS_SERVICE != ''
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment
