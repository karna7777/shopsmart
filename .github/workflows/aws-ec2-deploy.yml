name: AWS EC2 Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend on EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/shopsmart-ec2.pem
          chmod 600 ~/.ssh/shopsmart-ec2.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Run idempotent deploy script on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          ssh -i ~/.ssh/shopsmart-ec2.pem "$EC2_USER@$EC2_HOST" \
            "REPO_URL='$REPO_URL' sh -s" < scripts/ec2-deploy.sh
