name: Project CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Run server lint
        run: npm run lint
        working-directory: server

      - name: Run server tests
        run: |
          mkdir -p ../reports
          npm test -- --json --outputFile=../reports/backend-jest.json
        working-directory: server

      - name: Upload server test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: reports/backend-jest.json

  client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install client dependencies
        run: npm install
        working-directory: client

      - name: Run client lint
        run: npm run lint
        working-directory: client

      - name: Run client tests
        run: |
          mkdir -p ../reports
          npm test -- --run --reporter=json --outputFile=../reports/client-vitest.json
        working-directory: client

      - name: Upload client test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-test-report
          path: reports/client-vitest.json

      - name: Build client
        run: npm run build
        working-directory: client
