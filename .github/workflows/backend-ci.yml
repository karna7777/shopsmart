name: Project CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Run server lint
        run: npm run lint
        working-directory: server

      - name: Run server tests
        run: npm test
        working-directory: server

  client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install client dependencies
        run: npm install
        working-directory: client

      - name: Run client lint
        run: npm run lint
        working-directory: client

      - name: Run client tests
        run: npm test -- --run
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client
