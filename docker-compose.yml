services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shopsmart-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
    networks:
      - shopsmart-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: shopsmart-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - shopsmart-network

networks:
  shopsmart-network:
    driver: bridge
